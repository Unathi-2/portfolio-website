name: Sync Portfolio Projects

on:
  schedule:
    # Runs once a day at 05:00 UTC (07:00 SAST)
    - cron: '0 5 * * *'
  workflow_dispatch: {}   # allows manual run from the Actions tab
  push:
    paths:
      - 'frontend/update_projects.py'   # also run when the script itself changes

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated projects.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync script
        working-directory: frontend
        run: python update_projects.py

      - name: Commit and push if projects.json changed
        working-directory: frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --cached --quiet || git commit -m "Auto-update projects.json from Google Sheet"
          git push
