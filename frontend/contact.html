<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kekeletso Basholo</title>
    <meta name="description" content="Get in touch with Kekeletso Basholo for data analysis projects and collaborations.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    
    <script type="text/javascript">
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: { 850: '#151e2e' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Background Grid */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }
        .dark .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        /* Glass Card */
        .tech-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .tech-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Input styling to look like console */
        .console-input {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid #cbd5e1;
            transition: all 0.3s ease;
        }
        .dark .console-input {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: #e2e8f0;
        }
        .console-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 font-sans antialiased selection:bg-cyan-500/30">
    
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-grid-pattern"></div>
        <div class="blob-cont opacity-40 dark:opacity-20">
            <div class="blob blob-1 mix-blend-multiply dark:mix-blend-screen filter blur-3xl"></div>
            <div class="blob blob-2 mix-blend-multiply dark:mix-blend-screen filter blur-3xl"></div>
        </div>
    </div>

    <div class="relative z-10">
        <custom-navbar></custom-navbar>
        
        <main class="container mx-auto px-4 py-12">
            <div class="max-w-4xl mx-auto">
                
                <div class="text-center mb-12">
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-4">
                        Let's Work Together
                    </h1>
                    <p class="text-lg text-slate-600 dark:text-slate-400 font-mono">
                        initiating_connection...
                    </p>
                </div>

                <div class="tech-card rounded-2xl p-8 md:p-12 shadow-xl">
                    <div class="grid md:grid-cols-2 gap-12">
                        
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                                <span class="text-cyan-500">./</span> Get In Touch
                            </h2>
                            <p class="text-slate-600 dark:text-slate-300 mb-8">
                                I'm passionate about solving complex problems with data. Whether you need analysis, insights, or just want to connect.
                            </p>
                            
                            <div class="space-y-6">
                                <div class="flex items-start group">
                                    <div class="w-10 h-10 rounded bg-cyan-50 dark:bg-cyan-900/20 flex items-center justify-center text-cyan-600 dark:text-cyan-400 mr-4 group-hover:scale-110 transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-slate-900 dark:text-white font-mono text-sm">Email</h3>
                                        <p class="text-slate-600 dark:text-slate-400 text-sm">unathibasholo@gmail.com</p>
                                    </div>
                                </div>
                                
                                <div class="flex items-start group">
                                    <div class="w-10 h-10 rounded bg-violet-50 dark:bg-violet-900/20 flex items-center justify-center text-violet-600 dark:text-violet-400 mr-4 group-hover:scale-110 transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-slate-900 dark:text-white font-mono text-sm">Phone</h3>
                                        <p class="text-slate-600 dark:text-slate-400 text-sm">+27 630 167 901</p>
                                    </div>
                                </div>

                                <div class="flex items-start group">
                                    <div class="w-10 h-10 rounded bg-emerald-50 dark:bg-emerald-900/20 flex items-center justify-center text-emerald-600 dark:text-emerald-400 mr-4 group-hover:scale-110 transition-transform">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-slate-900 dark:text-white font-mono text-sm">Location</h3>
                                        <p class="text-slate-600 dark:text-slate-400 text-sm">Cape Town, South Africa</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                                <span class="text-cyan-500">>></span> Send Message
                            </h2>
                            <form class="space-y-4" id="contactForm">
                                <div>
                                    <label for="from_name" class="block text-xs font-mono text-slate-500 uppercase mb-1">Name *</label>
                                    <input type="text" id="from_name" name="from_name" required class="console-input w-full px-4 py-3 rounded-lg text-sm">
                                </div>
                                
                                <div>
                                    <label for="reply_to" class="block text-xs font-mono text-slate-500 uppercase mb-1">Email *</label>
                                    <input type="email" id="reply_to" name="reply_to" required class="console-input w-full px-4 py-3 rounded-lg text-sm">
                                </div>
                                
                                <div>
                                    <label for="subject" class="block text-xs font-mono text-slate-500 uppercase mb-1">Subject</label>
                                    <select id="subject" name="subject" class="console-input w-full px-4 py-3 rounded-lg text-sm cursor-pointer">
                                        <option value="">Select a topic...</option>
                                        <option value="project">Project Collaboration</option>
                                        <option value="employment">Employment Opportunity</option>
                                        <option value="consultation">Data Consultation</option>
                                        <option value="tutoring">Math Tutoring</option>
                                    </select>
                                </div>
                                
                                <div>
                                    <label for="message" class="block text-xs font-mono text-slate-500 uppercase mb-1">Message *</label>
                                    <textarea id="message" name="message" rows="4" required class="console-input w-full px-4 py-3 rounded-lg text-sm"></textarea>
                                </div>
                                
                                <button type="submit" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold font-mono py-3 px-8 rounded-lg transition-all duration-300 hover:shadow-lg flex items-center justify-center gap-2 group">
                                    <span>[ SEND_MESSAGE ]</span>
                                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                    </svg>
                                </button>
                                
                                <div id="statusMessage" class="text-center text-sm mt-2 hidden"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <custom-footer></custom-footer>
    <script src="script.js"></script>
</body>
</html>
